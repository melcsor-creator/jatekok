<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Játék – Az Elveszett Útvesztő 🚪</title>
  <link rel="stylesheet" href="style.css?v=5" />
</head>
<body>

<header class="site-header">
  <div class="logo">🚪 Útvesztő</div>
  <nav class="nav-links">
    <span id="nav-user" style="color:var(--muted);font-size:.9rem;"></span>
    <a href="profile.html" id="nav-profile" style="display:none;">Profilom</a>
    <a href="index.html">Főoldal</a>
    <a href="leaderboard.html">🏆 Ranglista</a>
    <button onclick="doLogout()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;">Kilépés</button>
  </nav>
</header>

<main class="container">

  <div id="continue-screen" style="display:none;" class="card fadeIn" style="margin-bottom:20px;">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;">
      <div>
        <div style="font-weight:700;font-size:1.05rem;">▶ Folytatod ahol abbahagytad?</div>
        <div style="color:var(--muted);font-size:.88rem;margin-top:4px;" id="continue-info"></div>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-primary btn-sm" onclick="continueGame()">Folytatás</button>
        <button class="btn btn-outline btn-sm" onclick="freshStart()">Újrakezdem</button>
      </div>
    </div>
  </div>

  <div class="hud fadeIn">
    <div class="lives" id="lives-display"></div>
    <div class="level-info">Szint: <span id="level-num">1</span> / <span id="level-total">10</span></div>
    <div class="score">⭐ <span id="score-display">0</span></div>
  </div>

  <div id="game-screen" class="card fadeIn">
    <div class="story-box" id="story-box"></div>
    <div class="question-box"><h2 id="question-text"></h2></div>
    <div class="doors-grid" id="doors-grid"></div>
    <div class="feedback-bar" id="feedback-bar"></div>
    <div class="next-btn-wrap">
      <button class="btn btn-primary" id="next-btn" style="display:none;" onclick="nextLevel()">Tovább ➜</button>
    </div>
  </div>

  <div id="result-screen" class="card result-screen fadeIn" style="display:none;">
    <div class="big-icon" id="result-icon"></div>
    <h1 id="result-title"></h1>
    <div class="result-score" id="result-score"></div>
    <p id="result-sub"></p>
    <div class="result-actions">
      <button class="btn btn-primary" onclick="freshStart()">🔄 Újrakezdés</button>
      <a href="profile.html" id="result-profile-link" class="btn btn-outline">👤 Profil</a>
    </div>
  </div>

</main>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="data.js?v=5"></script>
<script>
const SESSION_KEY = 'doorpuzzle_session';
const username = localStorage.getItem(SESSION_KEY);

if (!username) { window.location.href = 'index.html'; }

document.getElementById('nav-user').textContent = username || '';
document.getElementById('nav-profile').style.display = 'inline';
document.getElementById('nav-profile').href = 'profile.html?player=' + encodeURIComponent(username);
document.getElementById('result-profile-link').href = 'profile.html?player=' + encodeURIComponent(username);

function doLogout() { localStorage.removeItem(SESSION_KEY); window.location.href = 'index.html'; }

function saveKey() { return 'doorpuzzle_progress_' + username; }
function saveProgress() {
  localStorage.setItem(saveKey(), JSON.stringify({ currentLevel, lives, score, streak }));
}
function loadProgress() {
  try { return JSON.parse(localStorage.getItem(saveKey())); } catch(e) { return null; }
}
function clearProgress() { localStorage.removeItem(saveKey()); }

let currentLevel = 0, lives = MAX_LIVES, score = 0, streak = 0, answered = false;

function renderLives() {
  const el = document.getElementById('lives-display');
  el.innerHTML = '';
  for (let i = 0; i < MAX_LIVES; i++) el.innerHTML += i < lives ? '❤️' : '🖤';
}
function renderScore() { document.getElementById('score-display').textContent = score; }
function renderLevel() {
  document.getElementById('level-num').textContent = currentLevel + 1;
  document.getElementById('level-total').textContent = LEVELS.length;
}

function loadLevel() {
  answered = false;
  const lvl = LEVELS[currentLevel];
  document.getElementById('story-box').textContent = lvl.story;
  document.getElementById('question-text').textContent = '❓ ' + lvl.question;
  const grid = document.getElementById('doors-grid');
  grid.innerHTML = '';
  lvl.doors.forEach((door, idx) => {
    const btn = document.createElement('button');
    btn.className = 'door-btn';
    btn.innerHTML = `
      <div class="door-label">${door.label}</div>
      <div class="door-icon">🚪</div>
      <div class="door-answer" style="display:block;">${door.answer}</div>
      <div class="door-hint">${door.hint}</div>
    `;
    btn.addEventListener('click', () => chooseDoor(idx, btn));
    grid.appendChild(btn);
  });
  const fb = document.getElementById('feedback-bar');
  fb.className = 'feedback-bar'; fb.textContent = '';
  document.getElementById('next-btn').style.display = 'none';
  renderLevel();
}

function chooseDoor(idx, clickedBtn) {
  if (answered) return;
  answered = true;
  const lvl = LEVELS[currentLevel];
  const allBtns = document.querySelectorAll('.door-btn');
  allBtns.forEach(b => b.disabled = true);
  const isCorrect = idx === lvl.correct;
  const fb = document.getElementById('feedback-bar');
  const expl = lvl.explanation ? ' — ' + lvl.explanation : '';

  if (isCorrect) {
    clickedBtn.classList.add('correct');
    streak++;
    const bonus = streak > 1 ? POINTS_BONUS_STREAK * (streak - 1) : 0;
    const earned = POINTS_PER_CORRECT + bonus;
    score += earned; renderScore();
    fb.textContent = streak > 1
      ? '✅ Helyes! +' + earned + ' pont (' + streak + '× bónusz!)' + expl
      : '✅ Helyes! +' + earned + ' pont' + expl;
    fb.className = 'feedback-bar show correct-fb';
    clickedBtn.classList.add('pulse');
  } else {
    clickedBtn.classList.add('wrong');
    allBtns[lvl.correct].classList.add('reveal');
    streak = 0; lives--; renderLives();
    fb.textContent = '❌ Nem ez volt! Helyes: ' + lvl.doors[lvl.correct].answer + expl;
    fb.className = 'feedback-bar show wrong-fb';
    clickedBtn.classList.add('shake');
    if (lives <= 0) { clearProgress(); setTimeout(() => showResult(false), 1400); return; }
  }

  if (currentLevel >= LEVELS.length - 1 && isCorrect) {
    clearProgress(); setTimeout(() => showResult(true), 1600); return;
  }
  saveProgress();
  document.getElementById('next-btn').style.display = 'inline-block';
}

function nextLevel() {
  currentLevel++;
  if (currentLevel >= LEVELS.length) { clearProgress(); showResult(true); return; }
  saveProgress();
  const gs = document.getElementById('game-screen');
  gs.classList.remove('fadeIn'); void gs.offsetWidth; gs.classList.add('fadeIn');
  loadLevel();
}

async function showResult(won) {
  try {
    const ref = db.collection('users').doc(username);
    const snap = await ref.get();
    if (snap.exists) {
      const u = snap.data();
      const updates = {
        gamesPlayed: (u.gamesPlayed||0) + 1,
        totalPoints: (u.totalPoints||0) + score,
        lastPlayed: Date.now()
      };
      if (score > (u.bestScore||0)) updates.bestScore = score;
      if ((currentLevel+1) > (u.bestLevel||0)) updates.bestLevel = currentLevel + 1;
      await ref.update(updates);
    }
  } catch(e) { console.error('Mentési hiba:', e); }

  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('result-icon').textContent = won ? '🎉' : '💀';
  document.getElementById('result-title').textContent = won ? 'Gratulálok, kijutottál!' : 'Vége a játéknak!';
  document.getElementById('result-score').textContent = score + ' pont';
  document.getElementById('result-sub').textContent = won
    ? 'Teljesítetted mind a ' + LEVELS.length + ' szintet!'
    : 'Elérted a ' + (currentLevel+1) + '. szintet ' + LEVELS.length + '-ből.';
}

function continueGame() {
  document.getElementById('continue-screen').style.display = 'none';
  renderLives(); renderScore(); loadLevel();
}

function freshStart() {
  clearProgress();
  currentLevel = 0; lives = MAX_LIVES; score = 0; streak = 0; answered = false;
  document.getElementById('continue-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  renderLives(); renderScore(); loadLevel();
}

// Indítás
const saved = loadProgress();
if (saved && saved.currentLevel > 0) {
  currentLevel = saved.currentLevel; lives = saved.lives; score = saved.score; streak = saved.streak||0;
  document.getElementById('continue-screen').style.display = 'block';
  document.getElementById('continue-info').textContent =
    (currentLevel+1) + '. szint • ' + lives + ' ❤️ maradt • ' + score + ' pont';
  renderLives(); renderScore(); renderLevel();
} else {
  renderLives(); renderScore(); loadLevel();
}
</script>
</body>
</html>
