<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Online Játékok – Snake</title>
  <link rel="stylesheet" href="style.css?v=9"/>
  <style>
    .site-header{display:none;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;background:#06061a;color:#e8e8f5;font-family:'Segoe UI',sans-serif;}

    #ui{
      position:fixed;top:0;left:0;right:0;
      display:flex;justify-content:space-between;align-items:center;
      padding:10px 18px;background:rgba(6,6,26,.95);
      border-bottom:1px solid #2e2e5e;z-index:10;
    }
    #ui a{color:#8888aa;font-size:.8rem;text-decoration:none;}
    .ui-stat{text-align:center;}
    .ui-val{font-size:1.6rem;font-weight:900;line-height:1;}
    .ui-lbl{font-size:.65rem;color:#8888aa;}

    canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%;}

    /* Virtuális gombok mobilra */
    #dpad{
      position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
      display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;
      gap:6px;z-index:20;width:180px;
    }
    .dpad-btn{
      width:52px;height:52px;border-radius:12px;
      background:rgba(124,92,252,.25);border:2px solid rgba(124,92,252,.4);
      font-size:1.4rem;display:flex;align-items:center;justify-content:center;
      cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;
      transition:background .1s;
    }
    .dpad-btn:active{background:rgba(124,92,252,.5);}
    #dpad-up{grid-column:2;grid-row:1;}
    #dpad-left{grid-column:1;grid-row:2;}
    #dpad-down{grid-column:2;grid-row:2;}
    #dpad-right{grid-column:3;grid-row:2;}

    /* Overlay */
    .overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;
      display:flex;align-items:center;justify-content:center;
    }
    .overlay.hidden{display:none;}
    .ov-box{
      background:#12122a;border:2px solid #7c5cfc;border-radius:20px;
      padding:32px 28px;text-align:center;max-width:340px;width:92%;
    }
    .ov-box h2{font-size:1.6rem;font-weight:900;margin-bottom:8px;}
    .ov-score{font-size:3.5rem;font-weight:900;color:#7c5cfc;line-height:1;margin:10px 0 4px;}
    .ov-best{font-size:.9rem;color:#f5c842;margin-bottom:16px;}
    .ov-btn{
      padding:12px 28px;border-radius:12px;border:none;
      background:linear-gradient(135deg,#7c5cfc,#c45cfc);color:#fff;
      font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;
      margin:4px;transition:all .2s;
    }
    .ov-btn:hover{transform:translateY(-1px);}
    .ov-btn2{
      padding:12px 20px;border-radius:12px;border:1px solid #2e2e5e;
      background:transparent;color:#8888aa;font-size:.9rem;font-weight:700;
      cursor:pointer;font-family:inherit;margin:4px;
    }

    /* Toplista az overlay-ben */
    .ov-lb{margin:16px 0;text-align:left;}
    .ov-lb-title{font-size:.72rem;color:#8888aa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;text-align:center;}
    .ov-lb-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:8px;font-size:.82rem;margin-bottom:3px;}
    .ov-lb-row.me{background:rgba(124,92,252,.18);border:1px solid rgba(124,92,252,.4);}
    .ov-lb-pos{width:22px;color:#8888aa;font-size:.75rem;}
    .ov-lb-name{flex:1;font-weight:700;}
    .ov-lb-score{color:#f5c842;font-weight:800;}

    /* Diff buttons */
    .diff-btns{display:flex;gap:8px;justify-content:center;margin-bottom:16px;}
    .diff-btn{
      padding:8px 18px;border-radius:10px;border:2px solid #3a3a6e;
      background:rgba(255,255,255,.05);color:#e8e8f5;font-size:.85rem;
      font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;
    }
    .diff-btn.sel,.diff-btn:hover{border-color:#7c5cfc;background:rgba(124,92,252,.2);}
  </style>
</head>
<body>

<div id="ui">
  <a href="index.html">← Főoldal</a>
  <div class="ui-stat">
    <div class="ui-val" id="score-disp" style="color:#7c5cfc;">0</div>
    <div class="ui-lbl">pont</div>
  </div>
  <div class="ui-stat">
    <div class="ui-val" id="best-disp" style="color:#f5c842;">0</div>
    <div class="ui-lbl">rekord</div>
  </div>
</div>

<canvas id="c"></canvas>

<!-- D-pad -->
<div id="dpad">
  <div class="dpad-btn" id="dpad-up" ontouchstart="setDir(0,-1)">▲</div>
  <div class="dpad-btn" id="dpad-left" ontouchstart="setDir(-1,0)">◀</div>
  <div class="dpad-btn" id="dpad-down" ontouchstart="setDir(0,1)">▼</div>
  <div class="dpad-btn" id="dpad-right" ontouchstart="setDir(1,0)">▶</div>
</div>

<!-- START overlay -->
<div class="overlay" id="start-ov">
  <div class="ov-box">
    <div style="font-size:3rem;margin-bottom:8px;">🐍</div>
    <h2>Snake</h2>
    <p style="color:#8888aa;font-size:.88rem;margin-bottom:16px;">Edd meg az almákat, de ne menj falba!</p>
    <div class="diff-btns">
      <button class="diff-btn sel" id="d-easy" onclick="selectDiff('easy')">🟢 Lassú</button>
      <button class="diff-btn" id="d-med" onclick="selectDiff('medium')">🟡 Normál</button>
      <button class="diff-btn" id="d-hard" onclick="selectDiff('hard')">🔴 Gyors</button>
    </div>
    <button class="ov-btn" onclick="startGame()">▶ Játék!</button>
    <a href="index.html"><button class="ov-btn2">Főoldal</button></a>
  </div>
</div>

<!-- GAME OVER overlay -->
<div class="overlay hidden" id="go-ov">
  <div class="ov-box">
    <div style="font-size:2.5rem;margin-bottom:6px;">💀</div>
    <h2>Vége!</h2>
    <div class="ov-score" id="go-score">0</div>
    <div class="ov-best" id="go-best">Rekord: 0</div>
    <div class="ov-lb">
      <div class="ov-lb-title">🏆 Toplista</div>
      <div id="lb-rows"><div style="color:#8888aa;font-size:.8rem;text-align:center;">Betöltés...</div></div>
    </div>
    <button class="ov-btn" onclick="startGame()">▶ Újra</button>
    <button class="ov-btn2" onclick="showStart()">Nehézség</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script>
const SESSION_KEY='doorpuzzle_session';
const username=localStorage.getItem(SESSION_KEY)||'Vendég';
const BEST_KEY='snake_best_'+username;

if(typeof db!=='undefined'){
  db.collection('presence').doc(username).set({name:username,online:true,where:'snake',since:Date.now()}).catch(()=>{});
  window.addEventListener('beforeunload',()=>db.collection('presence').doc(username).delete().catch(()=>{}));
}

const cv=document.getElementById('c');
const ctx=cv.getContext('2d');

// Konstansok
const GRID=20; // cella méret px
const SPEEDS={easy:130,medium:85,hard:50};
const COLS_BASE=20, ROWS_BASE=20;

let cols,rows,offsetX,offsetY;
let snake,dir,nextDir,food,score,best,gameLoop,diff,running;
diff='easy';
best=parseInt(localStorage.getItem(BEST_KEY)||'0');
document.getElementById('best-disp').textContent=best;

// Resize
function resize(){
  cv.width=window.innerWidth;
  cv.height=window.innerHeight;
  const uh=document.getElementById('ui').offsetHeight;
  const avW=cv.width;
  const avH=cv.height-uh-80; // hely a d-padnak
  const cs=Math.floor(Math.min(avW/COLS_BASE,avH/ROWS_BASE));
  cols=Math.floor(avW/cs);
  rows=Math.floor(avH/cs);
  offsetX=Math.floor((avW-cols*cs)/2);
  offsetY=uh+Math.floor((avH-rows*cs)/2);
  window.CELL=cs;
}
resize();
window.addEventListener('resize',()=>{resize();if(!running)drawIdle();});

// ── GAME ──
function startGame(){
  document.getElementById('start-ov').classList.add('hidden');
  document.getElementById('go-ov').classList.add('hidden');
  clearInterval(gameLoop);
  running=true;
  score=0;
  document.getElementById('score-disp').textContent='0';

  const midC=Math.floor(cols/2);
  const midR=Math.floor(rows/2);
  snake=[{x:midC,y:midR},{x:midC-1,y:midR},{x:midC-2,y:midR}];
  dir={x:1,y:0};
  nextDir={x:1,y:0};
  placeFood();
  gameLoop=setInterval(tick,SPEEDS[diff]);
}

function tick(){
  dir=nextDir;
  const head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};

  // Fal
  if(head.x<0||head.x>=cols||head.y<0||head.y>=rows){endGame();return;}
  // Saját test
  if(snake.some(s=>s.x===head.x&&s.y===head.y)){endGame();return;}

  snake.unshift(head);

  if(head.x===food.x&&head.y===food.y){
    score++;
    document.getElementById('score-disp').textContent=score;
    playEat();
    placeFood();
    // Gyorsítás minden 5 pontnál
    if(score%5===0){
      clearInterval(gameLoop);
      const spd=Math.max(SPEEDS[diff]-score*2,30);
      gameLoop=setInterval(tick,spd);
    }
  } else {
    snake.pop();
  }
  draw();
}

function placeFood(){
  let pos;
  do{ pos={x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)}; }
  while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
  food=pos;
  foodAnim=0;
}

let foodAnim=0;

function draw(){
  const cs=window.CELL;
  ctx.clearRect(0,0,cv.width,cv.height);

  // Háttér
  const bg=ctx.createLinearGradient(0,0,0,cv.height);
  bg.addColorStop(0,'#02020f');bg.addColorStop(1,'#06061a');
  ctx.fillStyle=bg;ctx.fillRect(0,0,cv.width,cv.height);

  // Rács (halvány)
  ctx.strokeStyle='rgba(255,255,255,.025)';ctx.lineWidth=1;
  for(let c=0;c<=cols;c++){ctx.beginPath();ctx.moveTo(offsetX+c*cs,offsetY);ctx.lineTo(offsetX+c*cs,offsetY+rows*cs);ctx.stroke();}
  for(let r=0;r<=rows;r++){ctx.beginPath();ctx.moveTo(offsetX,offsetY+r*cs);ctx.lineTo(offsetX+cols*cs,offsetY+r*cs);ctx.stroke();}

  // Pálya keret
  ctx.strokeStyle='rgba(124,92,252,.3)';ctx.lineWidth=2;
  ctx.strokeRect(offsetX-.5,offsetY-.5,cols*cs+1,rows*cs+1);

  // Kígyó
  snake.forEach((s,i)=>{
    const x=offsetX+s.x*cs, y=offsetY+s.y*cs;
    const t=i/snake.length;
    // Gradiens: fej élénkzöld, farok halványabb
    const r=Math.round(92*(1-t)+20*t);
    const g=Math.round(252*(1-t)+180*t);
    const b=Math.round(92*(1-t)+50*t);
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    const pad=i===0?1:2;
    roundRect(x+pad,y+pad,cs-pad*2,cs-pad*2,i===0?cs*.3:cs*.2);
    ctx.fill();
    // Fény a fejen
    if(i===0){
      ctx.fillStyle='rgba(255,255,255,.3)';
      roundRect(x+pad+2,y+pad+2,cs*.3,cs*.25,3);
      ctx.fill();
      // Szemek
      ctx.fillStyle='#001a00';
      const ex=dir.x===1?x+cs*.7:dir.x===-1?x+cs*.15:x+cs*.25;
      const ey=dir.y===1?y+cs*.7:dir.y===-1?y+cs*.15:y+cs*.25;
      const ex2=dir.y!==0?x+cs*.65:ex;
      const ey2=dir.x!==0?y+cs*.65:ey;
      ctx.beginPath();ctx.arc(ex,ey,cs*.1,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ex2,ey2,cs*.1,0,Math.PI*2);ctx.fill();
    }
  });

  // Alma (animált)
  foodAnim=(foodAnim+0.08)%(Math.PI*2);
  const pulse=1+Math.sin(foodAnim)*0.12;
  const fx=offsetX+food.x*cs+cs/2, fy=offsetY+food.y*cs+cs/2;
  const fr=cs*.38*pulse;
  ctx.save();
  ctx.translate(fx,fy);
  // Fény alatt
  const fg=ctx.createRadialGradient(-fr*.2,-fr*.2,fr*.1,0,0,fr);
  fg.addColorStop(0,'#ff8888');fg.addColorStop(.5,'#ff2222');fg.addColorStop(1,'#aa0000');
  ctx.fillStyle=fg;
  ctx.beginPath();ctx.arc(0,0,fr,0,Math.PI*2);ctx.fill();
  // Levél
  ctx.fillStyle='#44cc44';
  ctx.beginPath();ctx.ellipse(fr*.2,-fr*.9,fr*.25,fr*.4,-0.4,0,Math.PI*2);ctx.fill();
  // Szár
  ctx.strokeStyle='#885500';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,-fr*.6);ctx.bezierCurveTo(fr*.2,-fr*1.1,fr*.4,-fr*.9,fr*.1,-fr*.8);ctx.stroke();
  ctx.restore();

  // Pontszám a háttérben
  if(score>0){
    ctx.save();
    ctx.font=`bold ${Math.min(120,cv.width*.25)}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(92,252,92,.04)';
    ctx.fillText(score,cv.width/2,cv.height/2);
    ctx.restore();
  }

  requestAnimationFrame(()=>{if(running){}});// smooth alma animáció
}

function drawIdle(){
  const cs=window.CELL;
  ctx.clearRect(0,0,cv.width,cv.height);
  const bg=ctx.createLinearGradient(0,0,0,cv.height);
  bg.addColorStop(0,'#02020f');bg.addColorStop(1,'#06061a');
  ctx.fillStyle=bg;ctx.fillRect(0,0,cv.width,cv.height);
}

// Almán pattogó animáció futás közben
let animFrame;
function animLoop(){
  if(running){draw();animFrame=requestAnimationFrame(animLoop);}
}

function endGame(){
  running=false;
  clearInterval(gameLoop);
  cancelAnimationFrame(animFrame);
  playDie();

  if(score>best){
    best=score;
    localStorage.setItem(BEST_KEY,best);
    document.getElementById('best-disp').textContent=best;
    if(typeof db!=='undefined'){
      db.collection('users').doc(username).update({snakeBest:best}).catch(()=>{});
    }
  }
  document.getElementById('go-score').textContent=score;
  document.getElementById('go-best').textContent='Rekord: '+best+' pont';
  document.getElementById('go-ov').classList.remove('hidden');
  loadLeaderboard();
}

async function loadLeaderboard(){
  const container=document.getElementById('lb-rows');
  try{
    const snap=await db.collection('users').get();
    const list=[];
    snap.forEach(d=>{const u=d.data();if(u.snakeBest&&u.snakeBest>0)list.push({name:u.name,score:u.snakeBest});});
    list.sort((a,b)=>b.score-a.score);
    if(!list.length){container.innerHTML='<div style="color:#8888aa;font-size:.8rem;text-align:center;">Még nincs rekord</div>';return;}
    const med=['🥇','🥈','🥉'];
    container.innerHTML=list.slice(0,6).map((u,i)=>{
      const isMe=u.name===username;
      return `<div class="ov-lb-row${isMe?' me':''}">
        <span class="ov-lb-pos">${med[i]||(i+1)+'.'}</span>
        <span class="ov-lb-name">${u.name}${isMe?' <span style="font-size:.65rem;color:#7c5cfc">(Te)</span>':''}</span>
        <span class="ov-lb-score">${u.score}</span>
      </div>`;
    }).join('');
  }catch(e){container.innerHTML='<div style="color:#8888aa;font-size:.8rem;text-align:center;">Hiba</div>';}
}

function showStart(){
  document.getElementById('go-ov').classList.add('hidden');
  document.getElementById('start-ov').classList.remove('hidden');
  running=false;
}

function selectDiff(d){
  diff=d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('d-'+d.replace('medium','med')).classList.add('sel');
}

// ── INPUT ──
function setDir(x,y){
  if(x===1&&dir.x===-1)return;
  if(x===-1&&dir.x===1)return;
  if(y===1&&dir.y===-1)return;
  if(y===-1&&dir.y===1)return;
  nextDir={x,y};
}

document.addEventListener('keydown',e=>{
  if(!running)return;
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W')    {e.preventDefault();setDir(0,-1);}
  if(e.key==='ArrowDown'||e.key==='s'||e.key==='S')  {e.preventDefault();setDir(0,1);}
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')  {e.preventDefault();setDir(-1,0);}
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') {e.preventDefault();setDir(1,0);}
});

// Swipe
let tx,ty;
cv.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
cv.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){setDir(dx>0?1:-1,0);}
  else{setDir(0,dy>0?1:-1);}
},{passive:true});

// D-pad click (desktop)
document.getElementById('dpad-up').addEventListener('click',()=>setDir(0,-1));
document.getElementById('dpad-down').addEventListener('click',()=>setDir(0,1));
document.getElementById('dpad-left').addEventListener('click',()=>setDir(-1,0));
document.getElementById('dpad-right').addEventListener('click',()=>setDir(1,0));

// ── UTILS ──
function roundRect(x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

// ── HANGOK ──
let ac=null;
function getAC(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac;}
function playEat(){
  try{const c=getAC();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);
  o.type='sine';const n=c.currentTime;
  o.frequency.setValueAtTime(600,n);o.frequency.exponentialRampToValueAtTime(1200,n+.1);
  g.gain.setValueAtTime(.1,n);g.gain.exponentialRampToValueAtTime(.001,n+.12);
  o.start(n);o.stop(n+.12);}catch(e){}
}
function playDie(){
  try{const c=getAC();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);
  o.type='sawtooth';const n=c.currentTime;
  o.frequency.setValueAtTime(300,n);o.frequency.exponentialRampToValueAtTime(80,n+.4);
  g.gain.setValueAtTime(.15,n);g.gain.exponentialRampToValueAtTime(.001,n+.4);
  o.start(n);o.stop(n+.4);}catch(e){}
}

// Idle loop (alma pulzálás start screen-en)
function idleLoop(){animFrame=requestAnimationFrame(idleLoop);}
idleLoop();
</script>
</body>
</html>
