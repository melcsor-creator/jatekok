<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Online Játékok – Gyümölcs Szeletelő</title>
  <link rel="stylesheet" href="style.css?v=9"/>
  <style>
    .site-header{display:none;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;background:linear-gradient(180deg,#1a0a2e 0%,#0a0515 100%);color:#e8e8f5;font-family:'Segoe UI',sans-serif;touch-action:none;user-select:none;}

    /* HEADER */
    #hdr{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(26,10,46,.85);backdrop-filter:blur(8px);z-index:50;pointer-events:none;}
    #hdr a{color:rgba(255,255,255,.5);font-size:.82rem;text-decoration:none;pointer-events:all;}
    .hv{font-size:1.8rem;font-weight:900;color:#fff;text-shadow:0 0 14px rgba(255,255,255,.3);line-height:1;}
    .hl{font-size:.62rem;color:rgba(255,255,255,.4);text-align:center;}
    #lives{display:flex;gap:3px;}
    .life{font-size:1.4rem;transition:all .3s;}
    .life.lost{opacity:.15;transform:scale(.7);}

    /* PLAY AREA */
    #play-area{position:fixed;inset:0;overflow:hidden;cursor:crosshair;}

    /* SLASH TRAIL */
    #slash-canvas{position:fixed;inset:0;pointer-events:none;z-index:40;}

    /* FRUIT */
    .fruit-obj{
      position:absolute;
      border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      pointer-events:none;
      z-index:30;
      transition:none;
    }
    .fruit-emoji{
      font-size:3.2rem;
      line-height:1;
      filter:drop-shadow(0 2px 8px rgba(0,0,0,.5));
    }
    .fruit-obj.sliced{pointer-events:none;}
    .fruit-half{
      position:absolute;
      border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      pointer-events:none;
      z-index:29;
      overflow:hidden;
    }
    .fruit-half .fruit-emoji{font-size:3rem;}

    /* JUICE PARTICLE */
    .juice-dot{
      position:absolute;
      border-radius:50%;
      pointer-events:none;
      z-index:28;
    }

    /* SCORE POPUP */
    .score-popup{
      position:absolute;
      font-size:1.4rem;font-weight:900;color:#f5c842;
      pointer-events:none;z-index:45;
      text-shadow:0 2px 8px rgba(0,0,0,.8);
      animation:scoreFly .8s ease forwards;
    }
    @keyframes scoreFly{0%{opacity:1;transform:translateY(0) scale(1.2)}100%{opacity:0;transform:translateY(-60px) scale(.8)}}

    .combo-popup{
      position:fixed;top:15%;left:50%;transform:translateX(-50%);
      font-size:2rem;font-weight:900;color:#f5c842;
      pointer-events:none;z-index:45;
      text-shadow:0 0 20px rgba(245,200,66,.8);
      animation:comboAnim .6s ease forwards;
    }
    @keyframes comboAnim{0%{opacity:0;transform:translateX(-50%) scale(.5)}40%{opacity:1;transform:translateX(-50%) scale(1.2)}80%{opacity:1;transform:translateX(-50%) scale(1)}100%{opacity:0;transform:translateX(-50%) scale(.9)}}

    /* OVERLAYS */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;align-items:center;justify-content:center;}
    .overlay.h{display:none;}
    .ov-box{
      background:linear-gradient(135deg,#1a0a2e,#0d0d1a);
      border:2px solid rgba(255,255,255,.12);border-radius:24px;
      padding:36px 28px;text-align:center;max-width:340px;width:92%;
    }
    .ov-box h1{font-size:2rem;font-weight:900;margin-bottom:6px;}
    .ov-sc{font-size:3.5rem;font-weight:900;color:#f5c842;line-height:1;margin:10px 0 4px;}
    .ov-best{font-size:.9rem;color:rgba(255,255,255,.4);margin-bottom:18px;}
    .ov-btn{padding:13px 28px;border-radius:14px;border:none;background:linear-gradient(135deg,#7c5cfc,#c45cfc);color:#fff;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;margin:4px;transition:all .2s;}
    .ov-btn:hover{transform:translateY(-2px);}
    .ov-btn2{padding:12px 20px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.5);font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;margin:4px;}
    .diff-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;}
    .diff-opt{padding:7px 14px;border-radius:10px;border:2px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.7);font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
    .diff-opt.sel{border-color:#7c5cfc;background:rgba(124,92,252,.2);color:#fff;}

    /* LB */
    .ov-lb{margin:12px 0 18px;text-align:left;}
    .ov-lb-title{font-size:.7rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;text-align:center;}
    .lb-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:8px;font-size:.82rem;margin-bottom:3px;}
    .lb-row.me{background:rgba(124,92,252,.2);border:1px solid rgba(124,92,252,.35);}
    .lb-pos{width:22px;color:rgba(255,255,255,.4);font-size:.75rem;}
    .lb-name{flex:1;font-weight:700;}
    .lb-score{color:#f5c842;font-weight:800;}

    /* Confetti */
    .cfp{position:fixed;pointer-events:none;z-index:9999;top:-10px;animation:cfF linear forwards;}
    @keyframes cfF{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
  </style>
</head>
<body>

<div id="hdr">
  <a href="index.html">← Főoldal</a>
  <div style="text-align:center;">
    <div class="hv" id="score-disp">0</div>
    <div class="hl">pont</div>
  </div>
  <div id="lives">
    <div class="life" id="l0">❤️</div>
    <div class="life" id="l1">❤️</div>
    <div class="life" id="l2">❤️</div>
  </div>
</div>

<div id="play-area">
  <canvas id="slash-canvas"></canvas>
</div>

<!-- START -->
<div class="overlay" id="start-ov">
  <div class="ov-box">
    <div style="font-size:3.5rem;margin-bottom:6px;">🍉</div>
    <h1>Gyümölcs<br>Szeletelő</h1>
    <p style="color:rgba(255,255,255,.5);font-size:.85rem;margin:8px 0 16px;">Húzd végig az ujjad a gyümölcsökön!<br>A 💣 bombát NE szeleteld!</p>
    <div class="diff-row">
      <div class="diff-opt sel" id="d-easy" onclick="selDiff('easy')">🟢 Könnyű</div>
      <div class="diff-opt" id="d-medium" onclick="selDiff('medium')">🟡 Normál</div>
      <div class="diff-opt" id="d-hard" onclick="selDiff('hard')">🔴 Nehéz</div>
    </div>
    <button class="ov-btn" onclick="startGame()">▶ Játék!</button>
    <a href="index.html"><button class="ov-btn2">Főoldal</button></a>
  </div>
</div>

<!-- GAME OVER -->
<div class="overlay h" id="go-ov">
  <div class="ov-box">
    <div style="font-size:3rem;margin-bottom:6px;" id="go-icon">💥</div>
    <h1 id="go-title">Vége!</h1>
    <div class="ov-sc" id="go-score">0</div>
    <div class="ov-best" id="go-best">Rekord: 0</div>
    <div class="ov-lb">
      <div class="ov-lb-title">🏆 Toplista</div>
      <div id="lb-rows"><div style="color:rgba(255,255,255,.4);font-size:.8rem;text-align:center;">Betöltés...</div></div>
    </div>
    <button class="ov-btn" onclick="startGame()">▶ Újra!</button>
    <button class="ov-btn2" onclick="showStart()">Nehézség</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script>
const SESSION_KEY='doorpuzzle_session';
const username=localStorage.getItem(SESSION_KEY)||'Vendég';
const BEST_KEY='fruit2_best_'+username;

if(typeof db!=='undefined'){
  db.collection('presence').doc(username).set({name:username,online:true,where:'gyümölcs',since:Date.now()}).catch(()=>{});
  window.addEventListener('beforeunload',()=>db.collection('presence').doc(username).delete().catch(()=>{}));
}

// ── ADATOK ──
const FRUITS=[
  {e:'🍉',c:'#e74c3c',p:1},{e:'🍊',c:'#e67e22',p:1},{e:'🍋',c:'#f1c40f',p:1},
  {e:'🍇',c:'#8e44ad',p:2},{e:'🍓',c:'#e74c3c',p:2},{e:'🍑',c:'#e67e22',p:1},
  {e:'🍍',c:'#f1c40f',p:3},{e:'🥝',c:'#27ae60',p:2},{e:'🍒',c:'#c0392b',p:2},
  {e:'🥭',c:'#f39c12',p:3},{e:'🍈',c:'#27ae60',p:2},{e:'🫐',c:'#2980b9',p:3},
];

const DIFFS={
  easy:  {interval:1600,maxFruits:5, gravity:0.18,bombChance:.07},
  medium:{interval:1100,maxFruits:7, gravity:0.22,bombChance:.12},
  hard:  {interval:750, maxFruits:9, gravity:0.28,bombChance:.18},
};

let diff='easy';
let score=0,lives=3,best=parseInt(localStorage.getItem(BEST_KEY)||'0');
let fruitObjs=[]; // aktív gyümölcs DOM elemek + fizika
let running=false;
let spawnTimer=null;
let gameFrame=null;
let combo=0,comboTimeout=null;
let slashTrail=[]; // [{x,y,t}]
let isSlicing=false;

// Canvas slash
const slashCv=document.getElementById('slash-canvas');
const slashCtx=slashCv.getContext('2d');
function resizeCanvas(){slashCv.width=window.innerWidth;slashCv.height=window.innerHeight;}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

// ── GAME ──
function startGame(){
  document.getElementById('start-ov').classList.add('h');
  document.getElementById('go-ov').classList.add('h');
  // Clean up
  document.querySelectorAll('.fruit-obj,.fruit-half,.juice-dot,.score-popup,.combo-popup').forEach(e=>e.remove());
  fruitObjs=[];score=0;lives=3;combo=0;slashTrail=[];
  clearInterval(spawnTimer);cancelAnimationFrame(gameFrame);
  updateScoreDisplay();updateLives();
  running=true;
  const cfg=DIFFS[diff];
  spawnTimer=setInterval(spawnFruit, cfg.interval);
  gameFrame=requestAnimationFrame(physicsLoop);
}

function showStart(){
  document.getElementById('go-ov').classList.add('h');
  document.getElementById('start-ov').classList.remove('h');
  running=false;clearInterval(spawnTimer);cancelAnimationFrame(gameFrame);
}

function selDiff(d){
  diff=d;
  document.querySelectorAll('.diff-opt').forEach(e=>e.classList.remove('sel'));
  document.getElementById('d-'+d).classList.add('sel');
}

// ── SPAWN ──
function spawnFruit(){
  if(!running)return;
  const cfg=DIFFS[diff];
  const active=fruitObjs.filter(f=>!f.gone).length;
  if(active>=cfg.maxFruits)return;

  const isBomb=Math.random()<cfg.bombChance;
  const fruit=isBomb?null:FRUITS[Math.floor(Math.random()*FRUITS.length)];

  const W=window.innerWidth, H=window.innerHeight;
  const size=130+Math.random()*40;
  const x=size+Math.random()*(W-size*2);
  const vy=-(H*.013+Math.random()*H*.008);
  const vx=(Math.random()-.5)*3;

  // DOM elem létrehozása
  const el=document.createElement('div');
  el.className='fruit-obj';
  el.style.cssText=`width:${size}px;height:${size}px;left:${x-size/2}px;top:${H+size}px;background:${isBomb?'radial-gradient(circle at 35% 35%,#555,#111)':'radial-gradient(circle at 35% 35%,rgba(255,255,255,.3),transparent)'};box-shadow:${isBomb?'':'0 0 16px '+fruit.c+'88'};`;

  const em=document.createElement('div');
  em.className='fruit-emoji';
  em.textContent=isBomb?'💣':fruit.e;
  el.appendChild(em);

  document.getElementById('play-area').appendChild(el);

  fruitObjs.push({
    el,isBomb,fruit,
    x,y:H+size,vx,vy,
    size,gravity:cfg.gravity,
    sliced:false,gone:false,
    rotation:0,rotSpeed:(Math.random()-.5)*4,
  });
}

// ── PHYSICS LOOP ──
function physicsLoop(){
  if(!running){return;}
  const H=window.innerHeight;

  fruitObjs.forEach(f=>{
    if(f.gone)return;
    f.vy+=f.gravity;
    f.x+=f.vx;
    f.y+=f.vy;
    f.rotation+=f.rotSpeed;
    f.el.style.left=(f.x-f.size/2)+'px';
    f.el.style.top=(f.y-f.size/2)+'px';
    f.el.style.transform=`rotate(${f.rotation}deg)`;

    // Kiesett alul
    if(f.y>H+f.size*2&&!f.sliced){
      f.gone=true;
      f.el.remove();
      if(!f.isBomb){
        loseLife();
      }
    }
  });

  // Slash trail rajz
  drawSlash();

  // Cleanup
  fruitObjs=fruitObjs.filter(f=>!f.gone);
  gameFrame=requestAnimationFrame(physicsLoop);
}

// ── SLASH ──
function drawSlash(){
  slashCtx.clearRect(0,0,slashCv.width,slashCv.height);
  const now=Date.now();
  slashTrail=slashTrail.filter(p=>now-p.t<200);
  if(slashTrail.length<2)return;
  slashCtx.lineCap='round';slashCtx.lineJoin='round';
  for(let i=1;i<slashTrail.length;i++){
    const a=slashTrail[i-1],b=slashTrail[i];
    const age=(now-b.t)/200;
    slashCtx.strokeStyle=`rgba(255,255,255,${(1-age)*.7})`;
    slashCtx.lineWidth=(1-age)*14+2;
    slashCtx.beginPath();slashCtx.moveTo(a.x,a.y);slashCtx.lineTo(b.x,b.y);slashCtx.stroke();
  }
}

// ── COLLISION ──
function checkSlice(x,y){
  fruitObjs.forEach(f=>{
    if(f.sliced||f.gone)return;
    const dx=f.x-x,dy=f.y-y;
    if(Math.sqrt(dx*dx+dy*dy)<f.size/2+10){
      sliceFruit(f,x,y);
    }
  });
}

function sliceFruit(f,sx,sy){
  f.sliced=true;
  f.gone=true;
  f.el.style.opacity='0';
  setTimeout(()=>f.el.remove(),50);

  if(f.isBomb){
    loseLife();
    spawnJuice(f.x,f.y,'#888',8);
    playSound('boom');
    showToastLocal('💣 Bomba!');
    return;
  }

  playSound('slice');
  spawnJuice(f.x,f.y,f.fruit.c,12);
  spawnHalves(f);

  combo++;
  clearTimeout(comboTimeout);
  comboTimeout=setTimeout(()=>combo=0,1200);

  const pts=f.fruit.p*(combo>=3?combo:1);
  score+=pts;
  updateScoreDisplay();
  spawnScorePopup(f.x,f.y,pts,combo>=3);
  if(combo>=3) spawnComboPopup(combo);
}

function spawnHalves(f){
  const area=document.getElementById('play-area');
  for(let i=0;i<2;i++){
    const h=document.createElement('div');
    h.className='fruit-half';
    const s=f.size*.9;
    h.style.cssText=`width:${s}px;height:${s}px;left:${f.x-s/2}px;top:${f.y-s/2}px;background:radial-gradient(circle,${f.fruit.c}88,${f.fruit.c}44);`;
    const em=document.createElement('div');
    em.className='fruit-emoji';em.textContent=f.fruit.e;
    em.style.opacity='.7';
    h.appendChild(em);
    area.appendChild(h);
    // Animált elröpülés
    const dir=i===0?-1:1;
    let vx=dir*(2+Math.random()*2),vy=-(2+Math.random()*2),vy2=vy,x2=f.x,y2=f.y,rot=f.rotation,alpha=1;
    const tick=()=>{
      vy2+=.15;x2+=vx;y2+=vy2;rot+=dir*5;alpha-=.025;
      h.style.left=(x2-s/2)+'px';h.style.top=(y2-s/2)+'px';
      h.style.transform=`rotate(${rot}deg)`;h.style.opacity=alpha;
      if(alpha>0)requestAnimationFrame(tick);else h.remove();
    };
    requestAnimationFrame(tick);
  }
}

function spawnJuice(x,y,color,n){
  const area=document.getElementById('play-area');
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.className='juice-dot';
    const s=4+Math.random()*6;
    d.style.cssText=`width:${s}px;height:${s}px;background:${color};left:${x}px;top:${y}px;`;
    area.appendChild(d);
    const a=Math.random()*Math.PI*2,spd=3+Math.random()*5;
    let vx=Math.cos(a)*spd,vy=Math.sin(a)*spd-2,dx=x,dy=y,alpha=1;
    const tick=()=>{
      vy+=.2;dx+=vx;dy+=vy;alpha-=.04;
      d.style.left=dx+'px';d.style.top=dy+'px';d.style.opacity=alpha;
      if(alpha>0)requestAnimationFrame(tick);else d.remove();
    };
    requestAnimationFrame(tick);
  }
}

function spawnScorePopup(x,y,pts,isCombo){
  const el=document.createElement('div');
  el.className='score-popup';
  el.textContent=(isCombo?'🔥 ':'+')+pts;
  el.style.left=x+'px';el.style.top=y+'px';
  document.getElementById('play-area').appendChild(el);
  setTimeout(()=>el.remove(),800);
}

function spawnComboPopup(n){
  document.querySelectorAll('.combo-popup').forEach(e=>e.remove());
  const el=document.createElement('div');
  el.className='combo-popup';
  el.textContent=n+'x COMBO!';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),700);
}

// ── LIVES ──
function loseLife(){
  lives=Math.max(0,lives-1);
  updateLives();
  // Képernyő flash
  const flash=document.createElement('div');
  flash.style.cssText='position:fixed;inset:0;background:rgba(255,0,0,.25);z-index:200;pointer-events:none;animation:flashOut .4s ease forwards;';
  document.body.appendChild(flash);
  const fs=document.createElement('style');
  fs.textContent='@keyframes flashOut{to{opacity:0}}';
  document.head.appendChild(fs);
  setTimeout(()=>{flash.remove();fs.remove();},400);
  if(lives<=0)endGame();
}

function updateLives(){
  [0,1,2].forEach(i=>document.getElementById('l'+i).classList.toggle('lost',i>=lives));
}

function updateScoreDisplay(){
  document.getElementById('score-disp').textContent=score;
}

// ── END ──
function endGame(){
  running=false;clearInterval(spawnTimer);cancelAnimationFrame(gameFrame);
  document.querySelectorAll('.fruit-obj').forEach(e=>{e.style.opacity='0';setTimeout(()=>e.remove(),200);});
  if(score>best){best=score;localStorage.setItem(BEST_KEY,best);
    if(typeof db!=='undefined') db.collection('users').doc(username).update({fruitBest:best}).catch(()=>{});
  }
  document.getElementById('go-icon').textContent=lives<=0?'💥':'🎉';
  document.getElementById('go-title').textContent=lives<=0?'Vége!':'Brávó!';
  document.getElementById('go-score').textContent=score;
  document.getElementById('go-best').textContent='Rekord: '+best+' pont';
  document.getElementById('go-ov').classList.remove('h');
  if(score>0)launchConfetti();
  loadLeaderboard();
}

async function loadLeaderboard(){
  const c=document.getElementById('lb-rows');
  try{
    const snap=await db.collection('users').get();
    const list=[];
    snap.forEach(d=>{const u=d.data();if(u.fruitBest>0)list.push({name:u.name,score:u.fruitBest});});
    list.sort((a,b)=>b.score-a.score);
    if(!list.length){c.innerHTML='<div style="color:rgba(255,255,255,.4);font-size:.8rem;text-align:center;">Még nincs rekord</div>';return;}
    const m=['🥇','🥈','🥉'];
    c.innerHTML=list.slice(0,6).map((u,i)=>{
      const me=u.name===username;
      return `<div class="lb-row${me?' me':''}"><span class="lb-pos">${m[i]||(i+1)+'.'}</span><span class="lb-name">${u.name}${me?' <span style="font-size:.6rem;color:#7c5cfc">(Te)</span>':''}</span><span class="lb-score">${u.score}</span></div>`;
    }).join('');
  }catch(e){c.innerHTML='<div style="color:rgba(255,255,255,.4);font-size:.8rem;">Hiba</div>';}
}

// ── INPUT ──
const area=document.getElementById('play-area');

function onMove(e){
  if(!running)return;
  const t=e.touches?e.touches[0]:e;
  const x=t.clientX,y=t.clientY;
  slashTrail.push({x,y,t:Date.now()});
  if(isSlicing)checkSlice(x,y);
}

area.addEventListener('mousedown',e=>{isSlicing=true;onMove(e);});
area.addEventListener('mousemove',onMove);
area.addEventListener('mouseup',()=>isSlicing=false);
area.addEventListener('touchstart',e=>{e.preventDefault();isSlicing=true;onMove(e);},{passive:false});
area.addEventListener('touchmove',e=>{e.preventDefault();onMove(e);},{passive:false});
area.addEventListener('touchend',e=>{e.preventDefault();isSlicing=false;},{passive:false});

// ── SOUNDS ──
let ac=null;
function getAC(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac;}
function playSound(t){
  try{
    const c=getAC(),n=c.currentTime;
    const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
    if(t==='slice'){o.type='sine';o.frequency.setValueAtTime(1000,n);o.frequency.exponentialRampToValueAtTime(300,n+.1);g.gain.setValueAtTime(.07,n);g.gain.exponentialRampToValueAtTime(.001,n+.12);o.start(n);o.stop(n+.12);}
    else if(t==='boom'){o.type='sawtooth';o.frequency.setValueAtTime(100,n);o.frequency.exponentialRampToValueAtTime(30,n+.4);g.gain.setValueAtTime(.15,n);g.gain.exponentialRampToValueAtTime(.001,n+.4);o.start(n);o.stop(n+.4);}
  }catch(e){}
}

// ── CONFETTI ──
function launchConfetti(){
  const cols=['#f5c842','#7c5cfc','#5cfc8e','#fc5c5c','#5c9efc'];
  for(let i=0;i<50;i++){
    setTimeout(()=>{
      const el=document.createElement('div');el.className='cfp';
      const s=6+Math.random()*8;
      el.style.cssText=`left:${Math.random()*100}vw;width:${s}px;height:${s}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.2+Math.random()}s;`;
      document.body.appendChild(el);setTimeout(()=>el.remove(),2400);
    },i*40);
  }
}
const cfs=document.createElement('style');cfs.textContent='@keyframes cfF{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}';document.head.appendChild(cfs);

// ── TOAST ──
function showToastLocal(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(200,0,0,.9);border-radius:10px;padding:10px 20px;font-size:.9rem;font-weight:800;z-index:9999;pointer-events:none;color:#fff;animation:tl .3s ease;';
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>t.remove(),1500);
}
const tls=document.createElement('style');tls.textContent='@keyframes tl{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}';document.head.appendChild(tls);
</script>
