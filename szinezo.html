<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Online Játékok – Színező</title>
  <link rel="stylesheet" href="style.css?v=9"/>
  <style>
    .site-header{display:none;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;background:#0d0d1a;color:#e8e8f5;font-family:'Segoe UI',sans-serif;}
    #app{display:flex;flex-direction:column;height:100vh;}

    /* TOP BAR */
    #top-bar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:rgba(13,13,26,.97);border-bottom:1px solid #2e2e5e;flex-shrink:0;flex-wrap:wrap;}
    #top-bar a{color:#8888aa;font-size:.8rem;text-decoration:none;}
    .tb-btn{background:rgba(255,255,255,.07);border:1px solid #3a3a6e;color:#e8e8f5;border-radius:8px;padding:5px 12px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;}
    .tb-btn:hover{background:rgba(124,92,252,.2);border-color:#7c5cfc;}
    #pic-title{font-size:.85rem;font-weight:800;color:#c45cfc;}

    /* PICTURE SELECT */
    #pic-select{display:flex;gap:8px;align-items:center;flex-wrap:nowrap;overflow-x:auto;}
    .pic-thumb{width:40px;height:40px;border-radius:8px;border:2px solid #3a3a6e;cursor:pointer;background:#1a1a35;display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:all .15s;flex-shrink:0;}
    .pic-thumb:hover,.pic-thumb.active{border-color:#7c5cfc;background:rgba(124,92,252,.15);}

    /* CANVAS */
    #canvas-area{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px;background:#1a1a2e;}
    #coloring-canvas{cursor:crosshair;border-radius:8px;border:2px solid #3a3a6e;box-shadow:0 0 30px rgba(0,0,0,.5);touch-action:none;display:block;max-width:100%;max-height:100%;}

    /* PALETTE */
    #palette-bar{flex-shrink:0;background:rgba(13,13,26,.97);border-top:1px solid #2e2e5e;padding:8px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
    #active-preview{width:36px;height:36px;border-radius:8px;border:2px solid #fff;flex-shrink:0;box-shadow:0 0 8px rgba(0,0,0,.5);}
    #palette{display:flex;gap:5px;flex-wrap:wrap;}
    .pal-c{width:30px;height:30px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s;flex-shrink:0;}
    .pal-c:hover{transform:scale(1.18);}
    .pal-c.sel{border-color:#fff;transform:scale(1.18);box-shadow:0 0 8px rgba(255,255,255,.4);}
    #custom-col{width:30px;height:30px;border-radius:6px;cursor:pointer;border:2px solid #3a3a6e;padding:0;background:none;overflow:hidden;}
    #custom-col::-webkit-color-swatch-wrapper{padding:0;}
    #custom-col::-webkit-color-swatch{border:none;border-radius:4px;}

    /* Toast */
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a35;border:1px solid #7c5cfc;border-radius:10px;padding:10px 20px;font-size:.85rem;font-weight:700;z-index:999;animation:fadeIn .3s ease;pointer-events:none;}
    @keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

    @media(max-width:600px){#palette-bar{overflow-x:auto;flex-wrap:nowrap;}#palette{flex-wrap:nowrap;}}
  </style>
</head>

const canvas = document.getElementById('coloring-canvas');
const ctx = canvas.getContext('2d');

let currentColor = '#ff0000';
let currentPic = 0;
let fills = {}; // { partId: color }
let svgPaths = {}; // { partId: Path2D }

// ── INIT ──
function init() {
  buildPalette();
  buildPicSelect();
  setColor('#ff6600');
  loadPicture(0);
  window.addEventListener('resize', () => { resizeCanvas(); redraw(); });
}

function buildPalette() {
  const pal = document.getElementById('palette');
  pal.innerHTML = '';
  PALETTE.forEach(c => {
    const d = document.createElement('div');
    d.className = 'pal-c';
    d.style.background = c;
    d.dataset.color = c;
    d.onclick = () => setColor(c);
    pal.appendChild(d);
  });
}

function buildPicSelect() {
  const sel = document.getElementById('pic-select');
  sel.innerHTML = '';
  PICTURES.forEach((pic, i) => {
    const d = document.createElement('div');
    d.className = 'pic-thumb' + (i === 0 ? ' active' : '');
    d.textContent = pic.icon;
    d.title = pic.name;
    d.onclick = () => { loadPicture(i); };
    sel.appendChild(d);
  });
}

function setColor(c) {
  currentColor = c;
  document.getElementById('active-preview').style.background = c;
  document.getElementById('custom-col').value = c;
  document.querySelectorAll('.pal-c').forEach(el => {
    el.classList.toggle('sel', el.dataset.color === c);
  });
}

function loadPicture(idx) {
  currentPic = idx;
  fills = {}; // Minden fehérrel kezd — te szinezed ki!
  const pic = PICTURES[idx];
  document.getElementById('pic-title').textContent = pic.name;
  // Thumbnails frissítése
  document.querySelectorAll('.pic-thumb').forEach((el, i) => el.classList.toggle('active', i === idx));
  resizeCanvas();
  buildPaths();
  redraw();
}

function resizeCanvas() {
  const area = document.getElementById('canvas-area');
  const avail = Math.min(area.clientWidth - 16, area.clientHeight - 16, 500);
  canvas.width  = avail;
  canvas.height = avail;
}

// Path2D építés — minden part-hoz
function buildPaths() {
  svgPaths = {};
  const pic = PICTURES[currentPic];
  const [vx, vy, vw, vh] = pic.viewBox.split(' ').map(Number);
  const sx = canvas.width  / vw;
  const sy = canvas.height / vh;

  pic.parts.forEach(part => {
    try {
      const p = new Path2D(scalePath(part.d, sx, sy, vx, vy));
      svgPaths[part.id] = p;
    } catch(e) {}
  });
}

// SVG path skálázása canvas mérethez
function scalePath(d, sx, sy, ox, oy) {
  // Számok helyettesítése skálázott értékekkel
  // Egyszerű megközelítés: transform mátrix alkalmazása
  return d; // Az SVG koordinátákat közvetlenül használjuk, transform-ot alkalmazzuk
}

// ── RAJZOLÁS ──
function redraw() {
  const pic = PICTURES[currentPic];
  const [vx, vy, vw, vh] = pic.viewBox.split(' ').map(Number);
  const sx = canvas.width  / vw;
  const sy = canvas.height / vh;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Fehér háttér
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.scale(sx, sy);

  pic.parts.forEach(part => {
    const p = new Path2D(part.d);
    const fillColor = fills[part.id] || (part.fill !== 'none' ? part.fill : null);

    if(fillColor && part.fill !== 'none') {
      ctx.fillStyle = fillColor;
      ctx.fill(p);
    }
    // Körvonal
    const stroke = part.stroke || '#222222';
    if(part.fill === 'none' || true) {
      ctx.strokeStyle = stroke;
      ctx.lineWidth = part.fill === 'none' ? 1.5 : 1.2;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.stroke(p);
    }
  });

  ctx.restore();
}

// ── KLIKK: melyik részre kattintott? ──
function getClickedPart(cx, cy) {
  const pic = PICTURES[currentPic];
  const [vx, vy, vw, vh] = pic.viewBox.split(' ').map(Number);
  const sx = canvas.width  / vw;
  const sy = canvas.height / vh;

  // Visszaskálázott koordináta
  const svgX = cx / sx;
  const svgY = cy / sy;

  // Hátulról előre keressük (felső rétegek előbb)
  for(let i = pic.parts.length - 1; i >= 0; i--) {
    const part = pic.parts[i];
    if(part.fill === 'none') continue; // csak kitölthető részek
    const p = new Path2D(part.d);
    // Ellenőrzés: a kattintás pont benne van-e (skálázatlan ctx-ben)
    const tempCtx = document.createElement('canvas').getContext('2d');
    tempCtx.canvas.width = vw;
    tempCtx.canvas.height = vh;
    if(tempCtx.isPointInPath(p, svgX, svgY)) {
      return part.id;
    }
  }
  return null;
}

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const cy = (e.clientY - rect.top)  * (canvas.height / rect.height);
  const partId = getClickedPart(cx, cy);
  if(partId) {
    fills[partId] = currentColor;
    redraw();
  }
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const cx = (t.clientX - rect.left) * (canvas.width / rect.width);
  const cy = (t.clientY - rect.top)  * (canvas.height / rect.height);
  const partId = getClickedPart(cx, cy);
  if(partId) {
    fills[partId] = currentColor;
    redraw();
  }
}, {passive:false});

// ── GOMBOK ──
function resetColors() {
  fills = {}; // Visszaállítás: minden fehér lesz
  redraw();
  showToast('🗑 Visszaállítva!');
}

function downloadImg() {
  const link = document.createElement('a');
  link.download = PICTURES[currentPic].name + '-szinezes.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('💾 Kép letöltve!');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

init();
